# global defaults, overridable per element
defaults:
  E: 210e9
  A: 0.01
  shape_func: quadratic

nodes:
  - id: 0
    x: 0.0
    y: 0.0
    constraints: [ux,uy]

  - id: 1
    x: 1.0
    y: 0.0

  - id: 2
    x: 2.0
    y: 0.0

  - id: 3
    x: 3.0
    y: 0.0
    constraints: [ uy] 

  - id: 4
    x: 0.5
    y: 0.7

  - id: 5
    x: 1.5
    y: 0.8
    force: [0,50000]
  
  - id: 6
    x: 2.5
    y: 0.7

elements:
  - id: 0
    nodes: [0, 1]
    # uses global E and A

  - id: 1
    nodes: [1, 2]
    # E: 70e9                    # override: aluminum
    # A: 0.005                   # override: thinner

  - id: 2
    nodes: [2, 3]

  - id: 3
    nodes: [0, 4]

  - id: 4
    nodes: [4, 1]

  - id: 5
    nodes: [5, 1]
    # force: [0,-90000]

  - id: 6
    nodes: [2, 5]
    force: [0,-90000]

  - id: 7
    nodes: [2, 6]

  - id: 8
    nodes: [3, 6]

  - id: 9
    nodes: [4, 5]

  - id: 10
    nodes: [5, 6]